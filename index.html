<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>about tomoksi</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f3f3f3;
            background-image: radial-gradient(#e0e0e0 2px, transparent 2px);
            background-size: 24px 24px;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
            cursor: none;
            padding-top: 40px;
        }

        #wii-cursor {
            width: 48px;
            height: 48px;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-15px, -10px);
            transition: transform 0.03s ease;
        }

        .wii-container {
            display: flex;
            align-items: center;
            max-width: 1200px;
            width: 100%;
            padding: 0 20px;
            position: relative;
        }

        .wii-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            grid-gap: 20px;
            flex-grow: 1;
        }

        .wii-channel {
            background: linear-gradient(to bottom, #ffffff 0%, #fcfcfc 40%, #efefef 100%);
            border: 4px solid #dbdbdb;
            border-radius: 20px;
            aspect-ratio: 1.57 / 1;
            box-shadow: 0 6px 0 #d5d5d5, inset 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #444;
            font-size: 1.2rem;
            position: relative;
            transition: all 0.1s ease;
            cursor: none;
        }

        .wii-channel:not(.empty):hover {
            border-color: #64b5f6;
            box-shadow: 0 6px 0 #1e88e5, 0 0 20px rgba(33, 150, 243, 0.5);
            transform: scale(1.03);
            color: #1e88e5;
        }

        .wii-channel:not(.empty):active {
            transform: scale(0.98) translateY(4px);
            box-shadow: 0 2px 0 #1e88e5;
        }

        .channel-content {
            text-align: center;
            pointer-events: none;
        }

        .wii-channel.empty {
            background: #fbfbfb;
            border: 4px solid #e8e8e8;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }

        .wii-next-btn {
            width: 45px;
            height: 75px;
            background: #ffffff;
            border: 4px solid #e0e0e0;
            border-radius: 12px;
            margin-left: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0 #d5d5d5;
            cursor: none;
            transition: all 0.1s ease;
        }

        .wii-next-btn:hover {
            border-color: #64b5f6;
            box-shadow: 0 4px 0 #1e88e5, 0 0 10px rgba(33, 150, 243, 0.3);
        }

        .wii-next-btn svg {
            width: 18px;
            fill: #9be2f6;
            stroke: #4baed4;
            stroke-width: 2;
        }

        .wii-bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 155px;
            background: #e2e2e2;
            z-index: 100;
        }

        .wii-bottom-curve {
            position: absolute;
            top: -4px;
            left: 0;
            width: 100%;
            height: 160px;
            background: #f3f3f3;
            border-top: 5px solid #a6e0f3;
            clip-path: polygon(0% 12%, 18% 12%, 30% 65%, 70% 65%, 82% 12%, 100% 12%, 100% 100%, 0% 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 60px 25px 60px;
        }

        .wii-btn-left, .wii-btn-right {
            background: linear-gradient(to bottom, #ffffff, #eaeaea);
            border: 4px solid #dfdfdf;
            border-radius: 50%;
            width: 82px;
            height: 82px;
            box-shadow: 0 5px 0 #cccccc;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: none;
            transition: all 0.1s ease;
        }

        .wii-btn-left:hover, .wii-btn-right:hover {
            border-color: #64b5f6;
            box-shadow: 0 5px 0 #1e88e5;
        }

        .wii-btn-left .inner-circle {
            width: 62px;
            height: 62px;
            border: 3px solid #e5e5e5;
            border-radius: 50%;
        }

        .wii-btn-right svg {
            width: 38px;
            height: 38px;
            fill: #7a7a7a;
        }

        .wii-sd-card {
            width: 34px;
            height: 44px;
            background: #5ac8fa;
            border: 2px solid #ffffff;
            border-radius: 4px;
            position: relative;
            clip-path: polygon(0% 20%, 20% 0%, 100% 0%, 100% 100%, 0% 100%);
            box-shadow: 0 3px 5px rgba(0,0,0,0.15);
            margin-bottom: 15px;
            margin-left: 40px;
        }

        .wii-sd-card::after {
            content: '';
            position: absolute;
            top: 30%; left: 20%; width: 60%; height: 15%;
            background: white;
            border-radius: 2px;
        }

        .wii-center-info {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 20px;
            text-align: center;
            font-family: 'Arial', sans-serif;
            color: #767676;
        }

        .wii-time {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: -1px;
            display: flex;
            justify-content: center;
            align-items: baseline;
        }

        .wii-time span {
            font-size: 1.2rem;
            margin-left: 8px;
            font-weight: normal;
        }

        .wii-date {
            font-size: 1.4rem;
            font-weight: bold;
            color: #8c8c8c;
            margin-top: -2px;
        }

        .wii-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 540px;
            background: white;
            border: 6px solid #4fc3f7;
            border-radius: 28px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            z-index: 10000;
            padding: 35px;
            text-align: center;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .wii-modal.active {
            display: block;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .wii-modal h2 {
            color: #333;
            margin-top: 0;
            font-size: 1.6rem;
        }

        .wii-modal p {
            color: #666;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .wii-modal-close {
            margin-top: 25px;
            background: linear-gradient(to bottom, #ffffff, #f1f1f1);
            border: 3px solid #dfdfdf;
            padding: 12px 45px;
            border-radius: 25px;
            font-weight: bold;
            color: #555;
            font-size: 1.1rem;
            box-shadow: 0 4px 0 #d5d5d5;
            cursor: none;
        }

        .wii-modal-close:hover {
            border-color: #64b5f6;
            color: #1e88e5;
            box-shadow: 0 4px 0 #1e88e5;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.08);
            z-index: 9998;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="wii-cursor">
        <svg id="cursor-svg" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path id="cursor-path" d="M12,4 C12,2 14,2 14,4 L14,14 L16,14 L16,5 C16,3 18,3 18,5 L18,14 L20,14 L20,7 C20,5 22,5 22,7 L22,14 L24,14 L24,10 C24,8 26,8 26,10 L26,18 C26,24 21,28 16,28 C11,28 7,24 7,18 L7,13 C7,11 9,11 9,13 L9,14 L10,14 L10,4 C10,2 12,2 12,4 Z" fill="white" stroke="#000000" stroke-width="2.5"/>
            <circle cx="14" cy="4" r="1.5" fill="#2196f3"/>
        </svg>
    </div>

    <div class="wii-container">
        <div class="wii-grid">
            <div class="wii-channel" onclick="openModal('about-modal')">
                <div class="channel-content">
                    <div style="font-size: 2.2rem; margin-bottom: 5px;">👤</div>
                    About Me
                </div>
            </div>

            <div class="wii-channel empty"></div>
            <div class="wii-channel empty"></div>
            <div class="wii-channel empty"></div>
            <div class="wii-channel empty"></div>
            <div class="wii-channel empty"></div>
            <div class="wii-channel empty"></div>
            <div class="wii-channel empty"></div>
            <div class="wii-channel empty"></div>
            <div class="wii-channel empty"></div>
            <div class="wii-channel empty"></div>
            <div class="wii-channel empty"></div>
        </div>

        <div class="wii-next-btn">
            <svg viewBox="0 0 24 24">
                <polygon points="6,4 18,12 6,20"/>
            </svg>
        </div>
    </div>

    <div class="wii-bottom-bar">
        <div class="wii-bottom-curve">
            <div style="display: flex; align-items: flex-end;">
                <div class="wii-btn-left">
                    <div class="inner-circle"></div>
                </div>
                <div class="wii-sd-card"></div>
            </div>

            <div class="wii-center-info">
                <div class="wii-time" id="clock">00:00<span>PM</span></div>
                <div class="wii-date" id="date">Fri 1/01</div>
            </div>

            <div class="wii-btn-right">
                <svg viewBox="0 0 24 24">
                    <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                </svg>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>

    <div class="wii-modal" id="about-modal">
        <h2>👤 About Me</h2>
        <hr style="border: 0; border-top: 2px solid #e2e2e2; margin: 15px 0;">
        <p>Yo, I'm tomoksi.</p>
        <p> I'm a beginner dev interested in programming and STEM subjects. I like pears and retro consoles.</p>
        <button class="wii-modal-close" onclick="closeAllModals()">Start</button>
    </div>

    <script>
        const cursor = document.getElementById('wii-cursor');
        const cursorPath = document.getElementById('cursor-path');

        const openHand = "M12,4 C12,2 14,2 14,4 L14,14 L16,14 L16,5 C16,3 18,3 18,5 L18,14 L20,14 L20,7 C20,5 22,5 22,7 L22,14 L24,14 L24,10 C24,8 26,8 26,10 L26,18 C26,24 21,28 16,28 C11,28 7,24 7,18 L7,13 C7,11 9,11 9,13 L9,14 L10,14 L10,4 C10,2 12,2 12,4 Z";
        const pointingHand = "M12,4 C12,2 14,2 14,4 L14,14 L16,14 L16,10 C16,8 18,8 18,10 L18,14 L20,14 L20,11 C20,9 22,9 22,11 L22,14 L24,14 L24,12 C24,10 26,10 26,12 L26,18 C26,24 21,28 16,28 C11,28 7,24 7,18 L7,14 C7,12 9,12 9,14 L9,14 L10,14 L10,4 C10,2 12,2 12,4 Z";

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const interactables = document.querySelectorAll('.wii-channel:not(.empty), .wii-next-btn, .wii-btn-left, .wii-btn-right, .wii-modal-close');
        
        interactables.forEach(item => {
            item.addEventListener('mouseenter', () => {
                cursorPath.setAttribute('d', pointingHand);
                cursor.style.transform = 'translate(-15px, -10px) scale(1.1)';
            });
            item.addEventListener('mouseleave', () => {
                cursorPath.setAttribute('d', openHand);
                cursor.style.transform = 'translate(-15px, -10px) scale(1)';
            });
        });

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12;
            
            document.getElementById('clock').innerHTML = `${hours}:${minutes}<span>${ampm}</span>`;
            
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const dayName = days[now.getDay()];
            const month = now.getMonth() + 1;
            const dayDate = now.getDate();
            
            document.getElementById('date').innerText = `${dayName} ${month}/${dayDate}`;
        }
        
        setInterval(updateClock, 1000);
        updateClock();

        function openModal(modalId) {
            document.getElementById('overlay').classList.add('active');
            document.getElementById(modalId).classList.add('active');
        }

        function closeAllModals() {
            document.getElementById('overlay').classList.remove('active');
            const modals = document.querySelectorAll('.wii-modal');
            modals.forEach(modal => modal.classList.remove('active'));
        }
    </script>
</body>
</html>
