<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Creative Universe</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            /* Gradient od jasnego fioletu u góry do różu na dole */
            background: linear-gradient(180deg, #c39eff 0%, #ff8da1 100%);
            font-family: 'Courier New', Courier, monospace, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Scenowy klimat - pływające bąbelki w tle */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            bottom: -50px;
            animation: float Up 8s infinite linear;
        }
        .bubble:nth-child(1) { width: 40px; height: 40px; left: 10%; animation-duration: 6s; }
        .bubble:nth-child(2) { width: 20px; height: 20px; left: 25%; animation-duration: 9s; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 50px; height: 50px; left: 70%; animation-duration: 7s; animation-delay: 1s; }
        .bubble:nth-child(4) { width: 30px; height: 30px; left: 85%; animation-duration: 5s; animation-delay: 3s; }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        /* Nagłówek strony */
        .header-title {
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-shadow: 2px 2px 0px #7b43a2, 4px 4px 0px rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* Główny kontener na siatkę z dużą, wspólną zieloną ramką */
        .board-wrapper {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border: 6px solid #99ff33; /* Żywa zielona ramka */
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15), 0 0 20px rgba(153, 255, 51, 0.2);
            z-index: 10;
        }

        /* Siatka bardziej kwadratowych kafelków */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 25px;
            width: 85vw;
            max-width: 950px;
        }

        /* Pojedynczy bardziej kwadratowy kafelek */
        .card {
            background: #ffffff;
            /* Proporcje bliskie kwadratowi z zieloną ramką */
            border: 5px solid #99ff33;
            border-radius: 16px;
            aspect-ratio: 1.05 / 1; 
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: #481d66;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0px rgba(0,0,0,0.05);
        }

        /* Efekt najechania w klimacie scenowym (mocny neon glow) */
        .card:hover {
            transform: translateY(-8px);
            border-color: #7eff00;
            box-shadow: 0 15px 25px rgba(153, 255, 51, 0.4), 0 12px 0px #7eff00;
        }

        .card:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.1);
        }

        /* Grafika / Emotka w kafelku */
        .card-art {
            font-size: 42px;
            margin-bottom: 12px;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1));
        }

        /* Tekst w kafelku */
        .card-label {
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Styl dla czystych, wolnych kafelków */
        .card.blank {
            background: rgba(255, 255, 255, 0.3);
            border: 5px dashed rgba(255, 255, 255, 0.5);
            box-shadow: none;
            cursor: default;
        }
        .card.blank:hover {
            transform: none;
            box-shadow: none;
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <!-- Bąbelki tworzące klimat sceny w tle -->
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <!-- Tytuł strony / Bloga -->
    <h1 class="header-title">My Creative Universe</h1>

    <!-- Panel z kafelkami zamknięty w zielonej ramce -->
    <div class="board-wrapper">
        <div class="grid-container">
            
            <!-- Kanał About Me -->
            <a href="#about-me" class="card">
                <div class="card-art">👽</div>
                <div class="card-label">About Me</div>
            </a>

            <!-- Kanał Bloga -->
            <a href="#blog" class="card">
                <div class="card-art">🔮</div>
                <div class="card-label">My Blog</div>
            </a>

            <!-- Kanał Twórczości / Projektów -->
            <a href="#creations" class="card">
                <div class="card-art">🎨</div>
                <div class="card-label">Creations</div>
            </a>

            <!-- Kanał Kontaktowy -->
            <a href="#contact" class="card">
                <div class="card-art">💾</div>
                <div class="card-label">Contact</div>
            </a>

            <!-- Puste, przestrzenne kafelki dopełniające siatkę -->
            <div class="card blank"></div>
            <div class="card blank"></div>
            <div class="card blank"></div>
            <div class="card blank"></div>

        </div>
    </div>

</body>
</html>
