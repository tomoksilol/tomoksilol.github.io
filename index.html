<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wii Menu Portfolio</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f3f3f3;
            background-image: radial-gradient(#e0e0e0 2px, transparent 2px);
            background-size: 32px 32px;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: none;
        }

        #wii-cursor {
            width: 48px;
            height: 48px;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-15px, -10px);
            transition: transform 0.05s ease;
        }

        .wii-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 24px;
            padding: 40px;
            max-width: 1100px;
            width: 100%;
        }

        .wii-channel {
            background: linear-gradient(to bottom, #ffffff, #f9f9f9);
            border: 4px solid #e2e2e2;
            border-radius: 18px;
            aspect-ratio: 1.5 / 1;
            box-shadow: 0 6px 0 #d5d5d5, inset 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #666;
            font-size: 1.1rem;
            position: relative;
            transition: all 0.1s ease;
            cursor: none;
        }

        .wii-channel:hover {
            border-color: #64b5f6;
            box-shadow: 0 6px 0 #1e88e5, 0 0 15px rgba(33, 150, 243, 0.4);
            transform: translateY(-2px);
            color: #2196f3;
        }

        .wii-channel:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1e88e5;
        }

        .channel-content {
            text-align: center;
            pointer-events: none;
        }

        .wii-channel.empty {
            background: #ebebeb;
            border: 4px dashed #dbdbdb;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            transform: none;
        }
        .wii-channel.empty:hover {
            border-color: #dbdbdb;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            transform: none;
        }

        .wii-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background-color: #f3f3f3;
            border-top: 4px solid #e2e2e2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
        }

        .wii-btn {
            background: white;
            border: 3px solid #e2e2e2;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            box-shadow: 0 4px 0 #d5d5d5;
            cursor: none;
        }

        .wii-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 500px;
            background: white;
            border: 6px solid #4fc3f7;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 10000;
            padding: 30px;
            text-align: center;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .wii-modal.active {
            display: block;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .wii-modal h2 {
            color: #333;
            margin-top: 0;
        }

        .wii-modal p {
            color: #666;
            line-height: 1.6;
        }

        .wii-modal-close {
            margin-top: 20px;
            background: #f3f3f3;
            border: 3px solid #e2e2e2;
            padding: 10px 30px;
            border-radius: 20px;
            font-weight: bold;
            color: #666;
            box-shadow: 0 4px 0 #d5d5d5;
            cursor: none;
        }

        .wii-modal-close:hover {
            border-color: #64b5f6;
            color: #2196f3;
            box-shadow: 0 4px 0 #1e88e5;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1);
            z-index: 9998;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="wii-cursor">
        <svg id="cursor-svg" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path id="cursor-path" d="M12,4 C12,2 14,2 14,4 L14,14 L16,14 L16,5 C16,3 18,3 18,5 L18,14 L20,14 L20,7 C20,5 22,5 22,7 L22,14 L24,14 L24,10 C24,8 26,8 26,10 L26,18 C26,24 21,28 16,28 C11,28 7,24 7,18 L7,13 C7,11 9,11 9,13 L9,14 L10,14 L10,4 C10,2 12,2 12,4 Z" fill="white" stroke="#555" stroke-width="2"/>
            <circle cx="14" cy="4" r="1.5" fill="#2196f3"/>
        </svg>
    </div>

    <div class="wii-grid">
        <div class="wii-channel" onclick="openModal('about-modal')">
            <div class="channel-content">
                <div style="font-size: 2rem; margin-bottom: 5px;">👤</div>
                About Me
            </div>
        </div>

        <div class="wii-channel empty"></div>
        <div class="wii-channel empty"></div>
        <div class="wii-channel empty"></div>
        <div class="wii-channel empty"></div>
        <div class="wii-channel empty"></div>
        <div class="wii-channel empty"></div>
        <div class="wii-channel empty"></div>
    </div>

    <div class="wii-bar">
        <button class="wii-btn">◀</button>
        <div style="font-weight: bold; color: #aaa; letter-spacing: 2px;">Wii</div>
        <button class="wii-btn">▶</button>
    </div>

    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>

    <div class="wii-modal" id="about-modal">
        <h2>👤 About Me</h2>
        <hr style="border: 0; border-top: 2px solid #e2e2e2; margin: 15px 0;">
        <p>Siemanko! Witaj w moim kanale w stylu konsoli Wii.</p>
        <p>Tutaj możesz wpisać wszystko o sobie – czym się zajmujesz, jakie projekty tworzysz albo jakie są Twoje zajawki!</p>
        <button class="wii-modal-close" onclick="closeAllModals()">Start</button>
    </div>

    <script>
        const cursor = document.getElementById('wii-cursor');
        const cursorPath = document.getElementById('cursor-path');

        const openHand = "M12,4 C12,2 14,2 14,4 L14,14 L16,14 L16,5 C16,3 18,3 18,5 L18,14 L20,14 L20,7 C20,5 22,5 22,7 L22,14 L24,14 L24,10 C24,8 26,8 26,10 L26,18 C26,24 21,28 16,28 C11,28 7,24 7,18 L7,13 C7,11 9,11 9,13 L9,14 L10,14 L10,4 C10,2 12,2 12,4 Z";
        const pointingHand = "M12,4 C12,2 14,2 14,4 L14,14 L16,14 L16,10 C16,8 18,8 18,10 L18,14 L20,14 L20,11 C20,9 22,9 22,11 L22,14 L24,14 L24,12 C24,10 26,10 26,12 L26,18 C26,24 21,28 16,28 C11,28 7,24 7,18 L7,14 C7,12 9,12 9,14 L9,14 L10,14 L10,4 C10,2 12,2 12,4 Z";

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const interactables = document.querySelectorAll('.wii-channel:not(.empty), .wii-btn, .wii-modal-close');
        
        interactables.forEach(item => {
            item.addEventListener('mouseenter', () => {
                cursorPath.setAttribute('d', pointingHand);
                cursor.style.transform = 'translate(-15px, -10px) scale(1.1)';
            });
            item.addEventListener('mouseleave', () => {
                cursorPath.setAttribute('d', openHand);
                cursor.style.transform = 'translate(-15px, -10px) scale(1)';
            });
        });

        function openModal(modalId) {
            document.getElementById('overlay').classList.add('active');
            document.getElementById(modalId).classList.add('active');
        }

        function closeAllModals() {
            document.getElementById('overlay').classList.remove('active');
            const modals = document.querySelectorAll('.wii-modal');
            modals.forEach(modal => modal.classList.remove('active'));
        }
    </script>
</body>
</html>
